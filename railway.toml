[build]
builder = "DOCKERFILE"

[[services]]
name = "gateway-api"
dockerfile = "services/gateway_api/Dockerfile"
healthcheck = "/api/health"

[[services.variables]]
PORT = "8007"

[[services]]
name = "binance-ingest"
dockerfile = "services/binance_ingest/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8001"

[[services]]
name = "normalizer"
dockerfile = "services/normalizer/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8002"

[[services]]
name = "analytics"
dockerfile = "services/analytics/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8003"

[[services]]
name = "strategy-service"
dockerfile = "services/strategy_service/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8004"

[[services]]
name = "execution"
dockerfile = "services/execution/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8005"

[[services]]
name = "mcp-server"
dockerfile = "services/mcp_server/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8006"

[[services]]
name = "mcp-web-gateway"
dockerfile = "services/mcp_web_gateway/Dockerfile"
healthcheck = "/health"

[[services.variables]]
PORT = "8007"

# ── Migration service ─────────────────────────────────────────────────────────
# One-shot: runs `alembic upgrade head` then exits.
# Deploy this service first (or manually via Railway "Deploy" button) before
# starting the application services. Set DATABASE_URL in Railway Variables.
[[services]]
name = "migrate"
dockerfile = "Dockerfile.migrate"
